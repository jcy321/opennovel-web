[package]
name = "opennovel-sdk"
version = "0.1.0"
edition = "2021"
authors = ["OpenNovel Team"]
license = "MIT"
description = "OpenNovel 基础 SDK 框架 - Agent、Session、Message、Intent Gate 等核心模块"

[dependencies]
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
thiserror = "1"
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
futures = "0.3"
once_cell = "1.19"

[dev-dependencies]
tokio-test = "0.4"